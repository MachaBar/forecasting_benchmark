# @package _global_.model
name: "statistical"
probabilistic: false
models:
  - Naive
  - SeasonalNaive
  - AutoTheta
  - AutoETS
  - AutoARIMA

# Daily cycle @ 30-min steps = 48; hourly data = 24
season_length: 48

n_jobs: -1

# null = use all available history (native mode for statistical models)
# set to context_length for a fair "equal information" comparison with DL
max_lookback: null

# null = use all valid windows; set an int to cap evaluation windows (speed)
max_windows: null

